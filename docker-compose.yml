# ─────────────────────────────────────────────────────────
#  OpKit — локальное окружение
#
#  Поднимает два сервиса:
#    • postgres — основная БД
#    • redis    — брокер для Socket.IO адаптера
#
#  Запуск:  docker compose up -d
#  Стоп:    docker compose down
# ─────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: opkit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opkit
      POSTGRES_PASSWORD: opkit_secret
      POSTGRES_DB: opkit_db
    ports:
      # Пробрасываем только локально — не светим в прод
      - '5433:5432'
    volumes:
      # Персистентное хранилище данных
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U opkit']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opkit_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
